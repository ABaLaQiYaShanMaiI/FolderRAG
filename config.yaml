chunk:
  max_tokens: 500
  overlap_tokens: 50
binary:
  hex_preview_bytes: 8192
  index_ascii_segments: true
embedder:
  backend: local                 # local 或 deepseek
  model_name: BAAI/bge-small-zh-v1.5  # 当 backend 为 local 时使用
  batch_size: 32
  api_key: ${DEEPSEEK_API_KEY}   # 引用环境变量
vector_store:
  type: chroma
  persist_directory: ./data/chroma_db
