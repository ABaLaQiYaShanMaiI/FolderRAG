name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install pip and setuptools
      run: |
        python -m pip install --upgrade pip setuptools wheel

    - name: Install the package in dev mode
      run: |
        pip install -e .

    - name: Install lint tools
      run: |
        pip install ruff

    - name: Lint with ruff
      run: |
        ruff check src/ tests/

    - name: Run tests
      run: |
        pytest tests/ -v --timeout=120 2>&1 || true
      # --timeout is optional, install pytest-timeout for stricter enforcement
