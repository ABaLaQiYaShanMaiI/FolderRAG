<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>$escaped_title — $escaped_folder</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    max-width: 960px; margin: 0 auto; padding: 20px;
    background: #f8f9fa; color: #333; line-height: 1.6;
  }

  .nav-bar {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px; padding-bottom: 12px;
    border-bottom: 1px solid #e0e0e0; flex-wrap: wrap;
  }
  .nav-bar .back-link {
    color: #1a73e8; text-decoration: none; font-size: 0.9em;
    padding: 5px 12px; border-radius: 6px; transition: background 0.2s;
    white-space: nowrap;
  }
  .nav-bar .back-link:hover { background: #e8f0fe; }
  .nav-bar .file-path {
    font-size: 0.85em; color: #666; flex: 1; word-break: break-all;
  }
  .nav-bar .copy-all-btn {
    padding: 5px 14px; background: #1a73e8; color: white;
    border: none; border-radius: 6px; cursor: pointer;
    font-size: 0.85em; transition: background 0.2s; white-space: nowrap;
  }
  .nav-bar .copy-all-btn:hover { background: #1557b0; }
  .nav-bar .copy-all-btn.copied { background: #34a853; }

  .doc-meta {
    background: #e8f0fe; border-radius: 8px; padding: 10px 14px;
    margin-bottom: 20px; font-size: 0.85em; color: #444;
    display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
  }
  .doc-meta span { display: inline-flex; align-items: center; gap: 4px; }

  .doc-content {
    background: #fff; border: 1px solid #e0e0e0; border-radius: 8px;
    padding: 20px; overflow-x: auto;
  }
  .doc-content pre {
    margin: 0; font-family: 'Consolas', 'Courier New', 'SF Mono', monospace;
    font-size: 13px; line-height: 1.5;
    white-space: pre-wrap; word-break: break-word;
    background: transparent; color: inherit;
  }
  .doc-content code {
    font-family: inherit;
  }

  .footer {
    text-align: center; color: #999; font-size: 0.82em;
    margin-top: 24px; padding-top: 16px; border-top: 1px solid #e0e0e0;
  }

  /* Dark mode */
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e0e0e0; }
    .nav-bar { border-bottom-color: #333; }
    .nav-bar .back-link { color: #64b5f6; }
    .nav-bar .back-link:hover { background: #2a2a4e; }
    .nav-bar .file-path { color: #aaa; }
    .doc-meta { background: #2a2a4e; color: #ccc; }
    .doc-content { background: #16213e; border-color: #333; color: #e0e0e0; }
    .doc-content pre { color: #e0e0e0; }
    .footer { border-top-color: #333; color: #666; }
  }
</style>
</head>
<body>

<div class="nav-bar">
  <a class="back-link" href="../index.html">← $back_text</a>
  <span class="file-path">📄 $escaped_title</span>
  <button class="copy-all-btn" id="copyBtn" onclick="copyCode()">📋 $copy_text</button>
</div>

<div class="doc-meta">
  <span>📂 $escaped_folder</span>
  <span>📏 $size_text: $file_size_hr</span>
  <span>📝 $chars_text: $char_count</span>
  $meta_tags_html
</div>

<div class="doc-content">
  <pre><code id="fileCode">$escaped_text</code></pre>
</div>

<div class="footer">
  <p>$generated_by_text FolderKnowledgeSiteGeneratorForAI | $escaped_folder</p>
</div>

<script>
function copyCode() {
  const code = document.getElementById('fileCode');
  const text = code.textContent || code.innerText;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      showCopied();
    }).catch(() => {
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); showCopied(); } catch(e) {}
  document.body.removeChild(ta);
}

function showCopied() {
  const btn = document.getElementById('copyBtn');
  const originalText = btn.textContent;
  btn.textContent = '$copied_text';
  btn.classList.add('copied');
  setTimeout(() => {
    btn.textContent = originalText;
    btn.classList.remove('copied');
  }, 2000);
}
</script>
</body>
</html>
