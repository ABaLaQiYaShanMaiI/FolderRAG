<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FolderRAG - 语义搜索</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; }
    .container { max-width: 900px; margin: 0 auto; padding: 20px; }
    h1 { text-align: center; margin: 30px 0 10px; font-size: 28px; }
    .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
    .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
    .search-box input { flex: 1; padding: 12px 16px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; transition: border-color 0.2s; }
    .search-box input:focus { border-color: #007bff; }
    .search-box button { padding: 12px 28px; background: #007bff; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: background 0.2s; }
    .search-box button:hover { background: #0056b3; }
    .search-box button:disabled { background: #ccc; cursor: not-allowed; }
    #results { margin-top: 20px; }
    .result-card { background: #fff; border-radius: 10px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .result-card .meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 12px; color: #888; margin-bottom: 10px; }
    .result-card .meta .source { font-weight: 600; color: #007bff; }
    .result-card .meta .score { color: #28a745; font-weight: 600; }
    .result-card p { line-height: 1.6; font-size: 14px; color: #444; max-height: 200px; overflow-y: auto; }
    .hex-preview { margin-top: 12px; padding: 12px; background: #f8f9fa; border-radius: 6px; border: 1px solid #eee; }
    .hex-preview strong { font-size: 12px; color: #666; display: block; margin-bottom: 6px; }
    .hex-preview pre { font-family: "SF Mono", "Consolas", monospace; font-size: 12px; line-height: 1.4; overflow-x: auto; white-space: pre; }
    .loading { text-align: center; color: #888; padding: 40px; }
    .error { color: #dc3545; text-align: center; padding: 20px; }
    .empty { text-align: center; color: #999; padding: 40px; }
    .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; background: #fff; border-radius: 8px; margin-bottom: 20px; font-size: 13px; color: #666; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
    .status-bar .badge { padding: 2px 8px; border-radius: 10px; background: #e8f5e9; color: #2e7d32; font-weight: 600; }
    .k-select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📁 FolderRAG</h1>
    <p class="subtitle">对监控文件夹中的文档进行语义搜索</p>

    <div class="status-bar">
      <span>📊 文档数量: <span id="docCount" class="badge">-</span></span>
      <span id="statusText">🟢 运行中</span>
    </div>

    <div class="search-box">
      <input type="text" id="query" placeholder="输入搜索关键词..." onkeydown="if(event.key==='Enter') search()">
      <select id="k" class="k-select">
        <option value="3">3 条</option>
        <option value="5" selected>5 条</option>
        <option value="10">10 条</option>
      </select>
      <button id="searchBtn" onclick="search()">搜索</button>
    </div>

    <div id="results"></div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
